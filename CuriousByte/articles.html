<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curious Byte | Articles</title>

    <script src="keywords.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f8fbff;
            color: #0f172a;
            padding: 40px 8%;
        }

        /* BACK */
        .back {
            margin-bottom: 20px;
        }

        .back a {
            text-decoration: none;
            color: #1e88ff;
            font-weight: bold;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 48px;
        }

        .header h1 span {
            color: #1e88ff;
        }

        .header p {
            color: #64748b;
            margin-top: 10px;
        }

        /* SEE ALL */
        .see-all {
            text-align: center;
            margin: 20px 0 40px;
        }

        .see-all a {
            display: inline-block;
            padding: 10px 18px;
            background: #1e88ff;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .see-all a:hover {
            background: #0f6fe0;
        }

        /* SEARCH */
        .search-container {
            max-width: 800px;
            margin: 0 auto 30px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 15px 55px 15px 20px;
            border-radius: 30px;
            border: 2px solid #dbeafe;
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 50%;
            background: #1e88ff;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        #resultsText {
            text-align: center;
            margin-bottom: 25px;
            color: #64748b;
            font-weight: bold;
        }

        /* OUTER SOFT CONTAINER (button-like feel) */
        .article-card {
            max-width: 820px;
            margin: 30px auto;
            padding: 14px;
            background: rgba(30, 136, 255, 0.06);
            border-radius: 28px;
        }

        /* INNER REAL CARD */
        .card-inner {
            background: white;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .card-inner:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
        }

        /* IMAGE */
        .card-inner img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        /* CONTENT */
        .content {
            padding: 25px;
        }

        .content h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .content p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: #1e88ff;
            color: white;
            padding: 10px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0f6fe0;
        }

        /* BACK TO TOP */
        .top-link {
            text-align: center;
            margin: 40px 0 10px;
        }

        .top-link a {
            color: #1e88ff;
            font-weight: bold;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>

<body id="top">

    <!-- BACK -->
    <div class="back">
        <a href="index.html">← Back to Home</a>
    </div>

    <!-- HEADER -->
    <div class="header">
        <h1>Curious <span>Byte</span></h1>
        <p>Explore fascinating stories from technology, history, games, and beyond.</p>
    </div>

    <!-- SEE ALL -->
    <div class="see-all">
        <a href="library.html">📚 See All Articles</a>
    </div>

    <!-- SEARCH -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search articles...">
        <button class="search-btn" onclick="searchArticles()">🔍</button>
    </div>

    <div id="resultsText"></div>

    <!-- ARTICLES -->
    <div id="articlesContainer"></div>

    <script>

        const container = document.getElementById("articlesContainer");
        const input = document.getElementById("searchInput");
        const resultsText = document.getElementById("resultsText");

        function getVisibleArticles() {
            return articles.filter(article => article.show === "yes");
        }

        function renderArticles(list) {

            container.innerHTML = "";

            if (list.length === 0) {
                container.innerHTML = `
                    <p style="text-align:center; color:#64748b;">
                        No articles found.
                    </p>
                `;
                return;
            }

            list.forEach(article => {

                container.innerHTML += `
                    <div class="article-card">

                        <div class="card-inner">

                            <img src="${article.image}" alt="${article.title}">

                            <div class="content">

                                <h2>${article.title}</h2>

                                <p>${article.description}</p>

                                <a class="btn" href="${article.link}">
                                    Read Article →
                                </a>

                            </div>

                        </div>

                    </div>
                `;
            });

            container.innerHTML += `
                <div class="top-link">
                    <a href="#top" onclick="window.scrollTo({top:0, behavior:'smooth'})">
                        ↑ Back to Top
                    </a>
                </div>
            `;
        }

        function searchArticles() {

            const query = input.value.trim().toLowerCase();

            const base = getVisibleArticles();

            if (query === "") {
                resultsText.textContent = "";
                renderArticles(base);
                return;
            }

            const filtered = base.filter(article => {

                const titleMatch = article.title.toLowerCase().includes(query);

                const keywordMatch = article.keywords.some(k =>
                    k.toLowerCase().includes(query)
                );

                return titleMatch || keywordMatch;
            });

            resultsText.textContent =
                filtered.length > 0
                    ? `Results for "${query.substring(0, 25)}"`
                    : "The article couldn't be found";

            renderArticles(filtered);
        }

        input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") searchArticles();
        });

        input.addEventListener("input", function () {
            if (input.value.trim() === "") {
                resultsText.textContent = "";
                renderArticles(getVisibleArticles());
            }
        });

        renderArticles(getVisibleArticles());

    </script>

</body>
</html>
